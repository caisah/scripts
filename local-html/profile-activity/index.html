<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profile Activity</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe7;
        --panel: rgba(255, 251, 245, 0.9);
        --ink: #1f1a17;
        --muted: #6d625a;
        --line-a: #1f6f78;
        --line-b: #d97706;
        --grid: rgba(31, 26, 23, 0.12);
        --border: rgba(31, 26, 23, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(31, 111, 120, 0.14), transparent 32%),
          radial-gradient(circle at top right, rgba(217, 119, 6, 0.14), transparent 28%),
          linear-gradient(180deg, #fbf8f2 0%, var(--bg) 100%);
      }

      main {
        max-width: 1080px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 5vw, 3.2rem);
        line-height: 1;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      .panel {
        margin-top: 24px;
        padding: 20px;
        border: 1px solid var(--border);
        border-radius: 20px;
        background: var(--panel);
        backdrop-filter: blur(10px);
      }

      .metric-section {
        margin-top: 20px;
      }

      .metric-section h2 {
        margin: 0 0 10px;
        font-size: 1.05rem;
      }

      .legend {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
      }

      .swatch {
        width: 14px;
        height: 14px;
        border-radius: 999px;
      }

      .chart {
        width: 100%;
        height: auto;
        display: block;
        margin-top: 16px;
      }

      .table-group {
        margin-top: 12px;
      }

      .table-group summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--ink);
        cursor: pointer;
        list-style: none;
      }

      .table-group summary::-webkit-details-marker {
        display: none;
      }

      .table-group summary::after {
        content: "+";
        flex: 0 0 auto;
        font-size: 1.15rem;
        line-height: 1;
      }

      .table-group[open] summary::after {
        content: "-";
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 12px;
        font-size: 0.95rem;
      }

      th,
      td {
        padding: 10px 12px;
        text-align: left;
        border-top: 1px solid var(--border);
      }

      th {
        color: var(--muted);
        font-weight: 600;
      }

      .empty {
        padding: 48px 16px;
        text-align: center;
        color: var(--muted);
      }

      @media (max-width: 640px) {
        main {
          padding: 24px 14px 36px;
        }

        .panel {
          padding: 16px;
          border-radius: 16px;
        }

        table {
          font-size: 0.88rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Profile Activity</h1>
      <p>LinkedIn profile viewers and post impressions by execution time.</p>

      <section class="panel">
        <div id="chart-root"></div>
      </section>
    </main>

    <script>
      const chartRoot = document.getElementById("chart-root");

      const toNumber = (value) => {
        if (typeof value !== "string") {
          return null;
        }

        const normalized = value.replace(/,/g, "").match(/\d+(?:\.\d+)?/);
        return normalized ? Number(normalized[0]) : null;
      };

      const formatTime = (value) => new Date(value).toLocaleString();

      const renderEmpty = (message) => {
        chartRoot.innerHTML = `<div class="empty">${message}</div>`;
      };

      const buildPath = (points) => points.map((point, index) => `${index === 0 ? "M" : "L"}${point.x} ${point.y}`).join(" ");

      const getLabelIndexes = (length, maxLabels = 6) => {
        if (length <= maxLabels) {
          return new Set(Array.from({ length }, (_, index) => index));
        }

        const step = (length - 1) / (maxLabels - 1);
        return new Set(Array.from({ length: maxLabels }, (_, index) => Math.round(index * step)));
      };

      const renderMetricChart = ({ entries, key, title, color, ariaLabel }) => {
        const width = 960;
        const height = 420;
        const margin = { top: 24, right: 24, bottom: 70, left: 56 };
        const numericEntries = entries.map((entry, index) => ({
          index,
          timestamp: entry.timestamp,
          value: toNumber(entry[key]),
        }));

        const values = numericEntries.map((entry) => entry.value).filter((value) => value !== null);

        if (values.length === 0) {
          return `
            <div class="metric-section">
              <h2>${title}</h2>
              <div class="empty">No numeric metric values available yet.</div>
            </div>
          `;
        }

        const maxValue = Math.max(...values, 1);
        const minValue = 0;
        const xStep = numericEntries.length > 1 ? (width - margin.left - margin.right) / (numericEntries.length - 1) : 0;
        const toX = (index) => margin.left + xStep * index;
        const toY = (value) => {
          const usableHeight = height - margin.top - margin.bottom;
          const ratio = (value - minValue) / (maxValue - minValue || 1);
          return height - margin.bottom - ratio * usableHeight;
        };

        const points = numericEntries
          .filter((entry) => entry.value !== null)
          .map((entry) => ({ x: toX(entry.index), y: toY(entry.value) }));

        const metricPath = buildPath(points);
        const gridLines = Array.from({ length: 5 }, (_, index) => {
          const value = (maxValue / 4) * index;
          const y = toY(value);
          return `<g><line x1="${margin.left}" y1="${y}" x2="${width - margin.right}" y2="${y}" stroke="var(--grid)" /><text x="${margin.left - 10}" y="${y + 4}" text-anchor="end" fill="var(--muted)" font-size="12">${Math.round(value)}</text></g>`;
        }).join("");

        const labelIndexes = getLabelIndexes(numericEntries.length);
        const labels = numericEntries
          .filter((entry) => labelIndexes.has(entry.index))
          .map((entry) => {
            const x = toX(entry.index);
            return `<text x="${x}" y="${height - margin.bottom + 24}" text-anchor="middle" fill="var(--muted)" font-size="11">${new Date(entry.timestamp).toLocaleDateString()}</text>`;
          }).join("");

        return `
          <div class="metric-section">
            <h2>${title}</h2>
            <div class="legend"><i class="swatch" style="background: ${color}"></i>${title}</div>
            <svg class="chart" viewBox="0 0 ${width} ${height}" role="img" aria-label="${ariaLabel}">
              ${gridLines}
              <line x1="${margin.left}" y1="${height - margin.bottom}" x2="${width - margin.right}" y2="${height - margin.bottom}" stroke="var(--border)" />
              ${metricPath ? `<path d="${metricPath}" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />` : ""}
              ${numericEntries.map((entry) => entry.value !== null
                ? `<circle cx="${toX(entry.index)}" cy="${toY(entry.value)}" r="4" fill="${color}" />`
                : "").join("")}
              ${labels}
            </svg>
          </div>
        `;
      };

      const renderMetricTable = ({ entries, key, title }) => {
        const newestFirstEntries = [...entries].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

        return `
          <details class="table-group">
            <summary>${title} table data</summary>
            <table aria-label="${title} by date">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>${title}</th>
                </tr>
              </thead>
              <tbody>
                ${newestFirstEntries.map((entry) => `
                  <tr>
                    <td>${formatTime(entry.timestamp)}</td>
                    <td>${entry[key] ?? "-"}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </details>`;
      };

      const renderCharts = (entries) => {
        chartRoot.innerHTML = [
          `${renderMetricChart({
            entries,
            key: "profileViewers",
            title: "Profile viewers",
            color: "var(--line-a)",
            ariaLabel: "Profile viewers chart",
          })}${renderMetricTable({
            entries,
            key: "profileViewers",
            title: "Profile viewers",
          })}`,
          `${renderMetricChart({
            entries,
            key: "postImpressions",
            title: "Post impressions",
            color: "var(--line-b)",
            ariaLabel: "Post impressions chart",
          })}${renderMetricTable({
            entries,
            key: "postImpressions",
            title: "Post impressions",
          })}`,
        ].join("");
      };

      fetch("./data.json", { cache: "no-store" })
        .then((response) => {
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          return response.json();
        })
        .then((entries) => {
          if (!Array.isArray(entries) || entries.length === 0) {
            renderEmpty("No profile activity entries recorded yet.");
            return;
          }

          renderCharts(entries);
        })
        .catch((error) => {
          renderEmpty(`Unable to load activity data: ${error.message}`);
        });
    </script>
  </body>
  </html>
